map $http_x_forwarded_proto $ptoe_redirect_scheme {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/css application/javascript application/json text/html;

    location = /ptoe {
        return 301 $ptoe_redirect_scheme://$http_host/ptoe/;
    }

    location /ptoe/api/ {
        proxy_pass http://ptoe_api:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    location = /ptoe/internal/verify {
        internal;
        proxy_pass http://ptoe_api:4000/verify;
        proxy_pass_request_body off;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ptoe/login {
        try_files /ptoe/login.html =404;
        add_header Cache-Control "no-cache";
    }

    location ~ ^/ptoe/(login\.css|login\.js)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location = /ptoe/admin {
        return 301 $ptoe_redirect_scheme://$http_host/ptoe/admin/;
    }

    location ^~ /ptoe/admin/ {
        try_files $uri $uri/ /ptoe/admin/index.html;
    }

    location /ptoe/ {
        auth_request /ptoe/internal/verify;
        error_page 401 = @ptoe_login_redirect;

        try_files $uri $uri/ /ptoe/index.html =404;

        add_header Cache-Control "private, no-store";
    }

    location @ptoe_login_redirect {
        return 302 $ptoe_redirect_scheme://$http_host/ptoe/login?next=$request_uri;
    }
}
