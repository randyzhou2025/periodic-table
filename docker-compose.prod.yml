services:
  ptoe_postgres:
    image: postgres:16-alpine
    container_name: ptoe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ptoe
      POSTGRES_PASSWORD: ${PTOE_POSTGRES_PASSWORD:?set PTOE_POSTGRES_PASSWORD}
      POSTGRES_DB: periodic_table_auth
    volumes:
      - ptoe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptoe -d periodic_table_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  ptoe_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: periodic-table-api:latest
    container_name: ptoe_api
    restart: unless-stopped
    depends_on:
      ptoe_postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ptoe:${PTOE_POSTGRES_PASSWORD}@ptoe_postgres:5432/periodic_table_auth
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET min 32 chars}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?set ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD min 8 chars}
      ADMIN_SESSION_TTL_HOURS: ${ADMIN_SESSION_TTL_HOURS:-24}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-90}
      MAX_DEVICES_DEFAULT: ${MAX_DEVICES_DEFAULT:-1}
      IDLE_RELEASE_DAYS: ${IDLE_RELEASE_DAYS:-30}
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-5}
      CONTACT_WECHAT: ${CONTACT_WECHAT:-请联系客服微信（待配置）}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-support@example.com}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      PORT: "4000"
      HOST: 0.0.0.0
    ports:
      - "3041:4000"

  ptoe_web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: periodic-table-web:latest
    container_name: ptoe_web
    restart: unless-stopped
    depends_on:
      - ptoe_api
    ports:
      - "3040:80"

volumes:
  ptoe_pgdata:
