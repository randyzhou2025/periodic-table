<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在线设备 · 元素周期表</title>
    <link rel="stylesheet" href="/ptoe/login.css?v=2" />
    <link rel="stylesheet" href="/ptoe/admin/admin.css?v=6" />
  </head>
  <body>
    <main class="login-shell admin-shell">
      <section id="loginPanel" class="login-card">
        <p class="login-kicker">Periodic Table Admin</p>
        <h1>管理后台登录</h1>
        <p class="login-lead">请输入管理员账号密码。</p>

        <form id="adminLoginForm" class="login-form" novalidate>
          <label for="usernameInput">用户名</label>
          <input id="usernameInput" name="username" type="text" autocomplete="username" required />
          <label for="passwordInput">密码</label>
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" required />
          <p id="loginError" class="error-box" hidden></p>
          <button id="loginButton" type="button">登录</button>
        </form>
      </section>

      <section id="dashboardPanel" class="login-card admin-card admin-grid" hidden>
        <div id="adminNavMount"></div>

        <div class="admin-head">
          <div>
            <p class="login-kicker">Periodic Table Admin</p>
            <h1>在线设备</h1>
            <p class="login-lead">查看各授权码绑定的设备，可单独强制解绑。</p>
          </div>
          <button id="logoutButton" class="ghost-button" type="button">退出登录</button>
        </div>

        <p id="adminError" class="error-box" hidden></p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>状态</th>
                <th>授权码前缀</th>
                <th>备注</th>
                <th>设备 ID</th>
                <th>最近 IP</th>
                <th>归属地</th>
                <th>最后访问</th>
                <th>过期时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="sessionsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/ptoe/admin/common.js?v=3"></script>
    <script src="/ptoe/admin/sessions.js?v=4"></script>
  </body>
</html>
